<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Evento', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/admin/eventos}" class="btn btn-sm btn-outline-secondary">
                    <i data-lucide="arrow-left"></i>
                </a>
                <div>
                    <h1 class="page-title mb-0">
                        <i data-lucide="calendar" class="me-2"></i>
                        <span th:text="${evento.id != null ? 'Editar Evento' : 'Novo Evento'}"></span>
                    </h1>
                </div>
            </div>

            <div class="form-card">
                <form th:action="${evento.id != null ? '/admin/eventos/' + evento.id + '/editar' : '/admin/eventos/novo'}"
                      method="post">

                    <h6 class="section-title mb-3"><i data-lucide="info" class="me-2"></i>Informações do Evento</h6>
                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                            <input type="text" name="nome" class="form-control" th:value="${evento.nome}"
                                   placeholder="Ex: Show Coldplay" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Descrição <span class="text-danger">*</span></label>
                            <input type="text" name="descricao" class="form-control" th:value="${evento.descricao}"
                                   placeholder="Descreva o evento" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Data e Horário <span class="text-danger">*</span></label>
                            <input type="text" name="dataHorario" class="form-control" th:value="${evento.dataHorario}"
                                   placeholder="Ex: 15/08/2025 20:00" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Local <span class="text-danger">*</span></label>
                            <input type="text" name="local" class="form-control" th:value="${evento.local}"
                                   placeholder="Ex: Allianz Parque" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ingressos Disponíveis <span class="text-danger">*</span></label>
                            <input type="number" name="ingressosDisponiveis" class="form-control"
                                   th:value="${evento.ingressosDisponiveis}" min="0" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Valor Base (R$) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text">R$</span>
                                <input type="number" step="0.01" min="0" name="valorBase" class="form-control"
                                       th:value="${evento.valorBase}" placeholder="0,00" required/>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-end">
                        <a th:href="@{/admin/eventos}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-accent">
                            <i data-lucide="save"></i>
                            <span th:text="${evento.id != null ? 'Salvar Alterações' : 'Criar Evento'}"></span>
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>

</div>
</body>
</html>
