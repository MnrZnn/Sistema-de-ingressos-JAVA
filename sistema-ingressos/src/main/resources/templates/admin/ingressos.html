<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Admin — Ingressos', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="page-title"><i data-lucide="ticket" class="me-2"></i>Gerenciar Ingressos</h1>
            <p class="text-muted mb-0">Todos os ingressos do sistema</p>
        </div>
        <a th:href="@{/admin/ingressos/novo}" class="btn btn-accent">
            <i data-lucide="plus"></i> Novo Ingresso
        </a>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="wallet"></i></div>
                <div>
                    <div class="stat-label">Receita Total</div>
                    <div class="stat-value" th:text="'R$ ' + ${#numbers.formatDecimal(totalReceita, 1, 'POINT', 2, 'COMMA')}">R$ 0,00</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="users"></i></div>
                <div>
                    <div class="stat-label">Total de Ingressos</div>
                    <div class="stat-value" th:text="${ingressos.size()}">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="check-circle"></i></div>
                <div>
                    <div class="stat-label">Ativos</div>
                    <div class="stat-value" th:text="${totalAtivos}">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="filter-bar mb-4">
        <form th:action="@{/admin/ingressos}" method="get" class="row g-2 align-items-end">
            <div class="col-md-5">
                <label class="form-label fw-semibold">Buscar por evento</label>
                <div class="input-group">
                    <span class="input-group-text"><i data-lucide="search" style="width:16px;height:16px;"></i></span>
                    <input type="text" name="busca" class="form-control" placeholder="Nome do evento..." th:value="${busca}"/>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">Filtrar por status</label>
                <select name="status" class="form-select">
                    <option value="">Todos</option>
                    <option value="RESERVADO"  th:selected="${statusFiltro == 'RESERVADO'}">Reservado</option>
                    <option value="CONFIRMADO" th:selected="${statusFiltro == 'CONFIRMADO'}">Confirmado</option>
                    <option value="UTILIZADO"  th:selected="${statusFiltro == 'UTILIZADO'}">Utilizado</option>
                    <option value="CANCELADO"  th:selected="${statusFiltro == 'CANCELADO'}">Cancelado</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100"><i data-lucide="filter"></i> Filtrar</button>
            </div>
            <div class="col-md-2">
                <a th:href="@{/admin/ingressos}" class="btn btn-outline-secondary w-100"><i data-lucide="x"></i> Limpar</a>
            </div>
        </form>
    </div>

    <div class="table-card" th:if="${!ingressos.isEmpty()}">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th><i data-lucide="calendar" style="width:14px;height:14px;"></i> Evento</th>
                    <th><i data-lucide="map-pin" style="width:14px;height:14px;"></i> Local</th>
                    <th><i data-lucide="user" style="width:14px;height:14px;"></i> Comprador</th>
                    <th><i data-lucide="tag" style="width:14px;height:14px;"></i> Tipo</th>
                    <th><i data-lucide="dollar-sign" style="width:14px;height:14px;"></i> Valor</th>
                    <th><i data-lucide="activity" style="width:14px;height:14px;"></i> Status</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ing : ${ingressos}">
                    <td>
                        <div class="fw-semibold" th:text="${ing.nomeEvento}"></div>
                        <div class="text-muted small" th:text="${ing.dataEvento}"></div>
                    </td>
                    <td th:text="${ing.localEvento}"></td>
                    <td th:text="${ing.nomeComprador}"></td>
                    <td>
                        <span th:class="'badge badge-tipo badge-' + ${ing.tipoIngresso.toLowerCase()}"
                              th:text="${ing.tipoIngresso}"></span>
                    </td>
                    <td class="fw-semibold" th:text="'R$ ' + ${#numbers.formatDecimal(ing.calcularValor(), 1, 'POINT', 2, 'COMMA')}"></td>
                    <td>
                        <span th:class="'badge badge-status badge-' + ${ing.status.toLowerCase()}"
                              th:text="${ing.status}"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/ingressos/{id}(id=${ing.id})}" class="btn btn-sm btn-outline-primary">
                            <i data-lucide="eye" style="width:14px;height:14px;"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="empty-state" th:if="${ingressos.isEmpty()}">
        <i data-lucide="inbox"></i>
        <h5>Nenhum ingresso encontrado</h5>
        <p class="text-muted">Cadastre o primeiro ingresso clicando no botão acima.</p>
    </div>

</div>
</body>
</html>
