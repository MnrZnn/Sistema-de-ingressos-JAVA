<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="html(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | Sistema de Ingressos'">Sistema de Ingressos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/ingressos}">
            <i data-lucide="ticket" class="nav-icon"></i>
            <span class="brand-name">IngressoSys</span>
        </a>
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/ingressos}" class="nav-link-custom">
                <i data-lucide="layout-list"></i> Todos os Ingressos
            </a>
            <a th:href="@{/ingressos/novo}" class="btn btn-accent">
                <i data-lucide="plus"></i> Novo Ingresso
            </a>
        </div>
    </div>
</nav>

<!-- Alertas flash -->
<div class="container mt-3" th:if="${sucesso}">
    <div class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i data-lucide="check-circle-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container mt-3" th:if="${erro}">
    <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i data-lucide="alert-circle"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- Conteúdo da página -->
<main class="container py-4">
    <div th:replace="${content}"></div>
</main>

<!-- Footer -->
<footer class="footer mt-auto py-3">
    <div class="container text-center">
        <span class="text-muted small"></span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
