<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | Sistema de Ingressos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="w-100" style="max-width:420px; padding: 1.5rem;">

    <div class="text-center mb-4">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
            <i data-lucide="ticket" style="width:28px;height:28px;color:var(--blue-600);"></i>
            <span class="brand-name" style="font-size:1.4rem;color:var(--blue-600);">IngressoSys</span>
        </div>
        <p class="text-muted small">Entre na sua conta para continuar</p>
    </div>

    <div class="form-card">
        <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 py-2">
            <i data-lucide="check-circle-2" style="width:16px;height:16px;"></i> Logout realizado.
        </div>
        <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2 py-2">
            <i data-lucide="alert-circle" style="width:16px;height:16px;"></i> Usuário ou senha inválidos.
        </div>
        <div th:if="${sucesso}" class="alert alert-success d-flex align-items-center gap-2 py-2">
            <i data-lucide="check-circle-2" style="width:16px;height:16px;"></i>
            <span th:text="${sucesso}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Usuário</label>
                <div class="input-group">
                    <span class="input-group-text"><i data-lucide="user" style="width:15px;height:15px;"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required autofocus/>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i data-lucide="lock" style="width:15px;height:15px;"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required/>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i data-lucide="log-in"></i> Entrar
            </button>
        </form>

        <hr class="my-3"/>
        <p class="text-center text-muted small mb-0">
            Não tem conta? <a th:href="@{/registro}" style="color:var(--blue-600);">Criar conta</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
