<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' | Sistema de Ingressos'">Sistema de Ingressos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between flex-nowrap">
        <a class="navbar-brand d-flex align-items-center gap-2 flex-shrink-0" th:href="@{/ingressos}">
            <i data-lucide="ticket" class="nav-icon"></i>
            <span class="brand-name">IngressoSys</span>
        </a>
        <div class="navbar-links d-flex align-items-center gap-4">
            <!-- Links exclusivos do ADMIN -->
            <th:block th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                <a th:href="@{/admin/ingressos}" class="nav-link-custom">
                    <i data-lucide="layout-list"></i> Todos os Ingressos
                </a>
                <a th:href="@{/admin/eventos}" class="nav-link-custom">
                    <i data-lucide="calendar"></i> Eventos
                </a>
                <a th:href="@{/admin/relatorios}" class="nav-link-custom">
                    <i data-lucide="bar-chart-2"></i> Relatórios
                </a>
                <a th:href="@{/admin/ingressos/novo}" class="btn btn-accent">
                    <i data-lucide="plus"></i> Novo Ingresso
                </a>
            </th:block>
            <!-- Links exclusivos do CLIENTE -->
            <th:block th:if="${#authorization.expression('hasRole(''CLIENTE'')')}">
                <a th:href="@{/ingressos/catalogo}" class="nav-link-custom">
                    <i data-lucide="calendar"></i> Catálogo
                </a>
                <a th:href="@{/ingressos}" class="nav-link-custom">
                    <i data-lucide="layout-list"></i> Meus Ingressos
                </a>
            </th:block>
            <!-- Sair (todos autenticados) -->
            <th:block th:if="${#authorization.expression('isAuthenticated()')}">
                <form th:action="@{/logout}" method="post" class="d-inline m-0">
                    <button type="submit" class="nav-link-custom border-0 bg-transparent p-0 cursor-pointer">
                        <i data-lucide="log-out"></i> Sair
                    </button>
                </form>
            </th:block>
        </div>
    </div>
</nav>

<div class="container mt-3" th:if="${sucesso}">
    <div class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i data-lucide="check-circle-2"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>
<div class="container mt-3" th:if="${erro}">
    <div class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
        <i data-lucide="alert-circle"></i>
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="container py-4">
    <div th:replace="${content}"></div>
</main>

<footer class="footer mt-auto py-3">
    <div class="container text-center">
        <span class="text-muted small">Sistema de Ingressos &mdash; POO</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
