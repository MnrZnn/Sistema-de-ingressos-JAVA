<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Catálogo de Eventos', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="page-title"><i data-lucide="calendar" class="me-2"></i>Catálogo de Eventos</h1>
            <p class="text-muted mb-0">Eventos disponíveis para reserva</p>
        </div>
    </div>

    <div class="empty-state" th:if="${eventos.isEmpty()}">
        <i data-lucide="calendar-x"></i>
        <h5>Nenhum evento disponível</h5>
        <p class="text-muted">Volte em breve para conferir novos eventos.</p>
    </div>

    <div class="row g-3" th:unless="${eventos.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="evento : ${eventos}">
            <div class="form-card h-100 d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h6 class="fw-bold mb-0" th:text="${evento.nome}"></h6>
                    <span th:if="${evento.ingressosDisponiveis > 0}" class="badge badge-status badge-reservado">Disponível</span>
                    <span th:unless="${evento.ingressosDisponiveis > 0}" class="badge badge-status badge-cancelado">Esgotado</span>
                </div>
                <p class="text-muted small mb-3" th:text="${evento.descricao}"></p>
                <div class="mb-3" style="flex:1;">
                    <div class="detail-group">
                        <div class="detail-label"><i data-lucide="map-pin" style="width:13px;height:13px;"></i> Local</div>
                        <div class="detail-value small" th:text="${evento.local}"></div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i data-lucide="calendar" style="width:13px;height:13px;"></i> Data</div>
                        <div class="detail-value small" th:text="${evento.dataHorario}"></div>
                    </div>
                    <div class="detail-group">
                        <div class="detail-label"><i data-lucide="users" style="width:13px;height:13px;"></i> Disponíveis</div>
                        <div class="detail-value small" th:text="${evento.ingressosDisponiveis} + ' ingressos'"></div>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mt-auto pt-2" style="border-top:1px solid var(--border);">
                    <span class="fw-bold" style="color:var(--blue-600);"
                          th:text="'R$ ' + ${#numbers.formatDecimal(evento.valorBase, 1, 'POINT', 2, 'COMMA')}"></span>
                    <a th:if="${evento.ingressosDisponiveis > 0}"
                       th:href="@{/ingressos/reservar/{id}(id=${evento.id})}" class="btn btn-accent btn-sm">
                        <i data-lucide="ticket"></i> Reservar
                    </a>
                    <span th:unless="${evento.ingressosDisponiveis > 0}" class="text-muted small">Esgotado</span>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
