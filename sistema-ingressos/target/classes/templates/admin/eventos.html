<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html('Admin — Eventos', ~{::main-content})}">
<body>
<div th:fragment="main-content">

    <div class="page-header d-flex justify-content-between align-items-start mb-4">
        <div>
            <h1 class="page-title"><i data-lucide="calendar" class="me-2"></i>Gerenciar Eventos</h1>
            <p class="text-muted mb-0">Catálogo de eventos disponíveis</p>
        </div>
        <a th:href="@{/admin/eventos/novo}" class="btn btn-accent">
            <i data-lucide="plus"></i> Novo Evento
        </a>
    </div>

    <div class="empty-state" th:if="${eventos.isEmpty()}">
        <i data-lucide="calendar-x"></i>
        <h5>Nenhum evento cadastrado</h5>
        <a th:href="@{/admin/eventos/novo}" class="btn btn-accent mt-2">
            <i data-lucide="plus"></i> Criar Evento
        </a>
    </div>

    <div class="table-card" th:unless="${eventos.isEmpty()}">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Local</th>
                    <th>Data</th>
                    <th>Disponíveis</th>
                    <th>Valor Base</th>
                    <th>Status</th>
                    <th class="text-center">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ev : ${eventos}">
                    <td>
                        <div class="fw-semibold" th:text="${ev.nome}"></div>
                        <div class="text-muted small" th:text="${ev.descricao}"></div>
                    </td>
                    <td th:text="${ev.local}"></td>
                    <td th:text="${ev.dataHorario}"></td>
                    <td class="fw-semibold" th:text="${ev.ingressosDisponiveis}"></td>
                    <td th:text="'R$ ' + ${#numbers.formatDecimal(ev.valorBase, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td>
                        <span th:if="${ev.ativo}" class="badge badge-status badge-reservado">Ativo</span>
                        <span th:unless="${ev.ativo}" class="badge badge-status badge-cancelado">Inativo</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/admin/eventos/{id}/editar(id=${ev.id})}" class="btn btn-sm btn-outline-primary me-1">
                            <i data-lucide="edit" style="width:14px;height:14px;"></i>
                        </a>
                        <form th:action="@{/admin/eventos/{id}/deletar(id=${ev.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Excluir este evento?')">
                                <i data-lucide="trash-2" style="width:14px;height:14px;"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
